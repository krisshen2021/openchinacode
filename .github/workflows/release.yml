name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v, for example 0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install archive tools
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Install dependencies
        run: bun install

      - name: Normalize version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          version="${version#v}"
          if [[ ! "$version" =~ ^[0-9]+[.][0-9]+[.][0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; assets will be overwritten."
            exit 0
          fi

          args=(release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --notes "OpenChinaCode $TAG")
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"

      - name: Build and upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          OPENCODE_CHANNEL: latest
          OPENCODE_RELEASE: "1"
          OPENCODE_VERSION: ${{ steps.version.outputs.version }}
        run: bun run --cwd packages/opencode build --archive
